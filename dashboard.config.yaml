apps:
  - id: asia-travel-deals
    enabled: true
    manifest: packages/integrations/manifests/asia-travel-deals.dashboard-manifest.json
    panels:
      - id: deal-feed
        enabled: true
        position: travel
        order: 10
  - id: hotel-rate-finder
    enabled: true
    manifest: packages/integrations/manifests/hotel-rate-finder.dashboard-manifest.json
    panels:
      - id: hotel-watches
        enabled: true
        position: travel
        order: 20
      - id: hotel-status
        enabled: true
        position: operations
        order: 50
  - id: plaid
    enabled: true
    manifest: packages/integrations/manifests/plaid.dashboard-manifest.json
    panels:
      - id: plaid-sync
        enabled: true
        position: finance
        order: 10
  - id: gmail-intake
    enabled: true
    manifest: packages/integrations/manifests/gmail-intake.dashboard-manifest.json
    panels:
      - id: intake-queue
        enabled: true
        position: operations
        order: 20
  - id: flight-searcher
    enabled: true
    manifest: packages/integrations/manifests/flight-searcher.dashboard-manifest.json
    panels:
      - id: flight-watches
        enabled: true
        position: travel
        order: 30
  - id: coding-agent
    enabled: true
    manifest: packages/integrations/manifests/coding-agent.dashboard-manifest.json
    panels:
      - id: task-queue
        enabled: true
        position: operations
        order: 10
      - id: active-runs
        enabled: true
        position: operations
        order: 15
  - id: personal-memory
    enabled: true
    manifest: packages/integrations/manifests/personal-memory.dashboard-manifest.json
    panels:
      - id: memory-proposals
        enabled: true
        position: operations
        order: 40

codingAgent:
  modelPolicy:
    planner:
      harness: claude
      model: planner
    executor:
      harness: omp
      model: default
    reviewer:
      harness: omp
      model: default
    fallbackChain:
      - harness: claude
        model: executor-fallback
    escalateOnRepairAttempt: 2
