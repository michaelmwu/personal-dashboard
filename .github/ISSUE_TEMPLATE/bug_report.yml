name: Bug Report
description: Report a reproducible problem.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Include the smallest reliable reproduction you have.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, runtime versions, commit SHA, deployment environment, or other relevant context.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste short logs or attach screenshots. Do not include secrets.
      render: text
    validations:
      required: false
