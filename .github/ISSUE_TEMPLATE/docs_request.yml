name: Documentation Request
description: Report missing, confusing, or stale documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation Gap
      description: What is missing, confusing, or stale?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Where did you look, and what were you trying to do?
    validations:
      required: false
