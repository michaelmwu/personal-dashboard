name: Feature Request
description: Propose a new capability or workflow.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches are available?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, examples, constraints, or non-goals.
    validations:
      required: false
