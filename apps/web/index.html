<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Hermes / OpenClaw</p>
          <h1>Personal Dashboard</h1>
        </div>
        <div class="status-strip" id="status-strip">
          <span class="status-dot"></span>
          Loading
        </div>
      </header>

      <section class="metric-grid" id="metrics" aria-label="Dashboard metrics"></section>

      <section class="workspace">
        <div class="primary-column">
          <section class="panel alert-panel">
            <div class="panel-header">
              <h2>Fast Path Alerts</h2>
              <span id="alert-count"></span>
            </div>
            <div class="alert-list" id="alerts"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Recent Transactions</h2>
              <span>Pending + posted</span>
            </div>
            <div class="transaction-table" id="transactions"></div>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel">
            <div class="panel-header">
              <h2>Reward Engine</h2>
              <span id="reward-period"></span>
            </div>
            <div class="reward-list" id="rewards"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>OpenClaw</h2>
              <span id="openclaw-status"></span>
            </div>
            <div class="task-list" id="tasks"></div>
          </section>
        </aside>
      </section>

      <section class="domain-grid" aria-label="Integration domains">
        <section class="panel">
          <div class="panel-header">
            <h2>Travel Watches</h2>
            <span>Rates + fares</span>
          </div>
          <div class="compact-list" id="travel-watches"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Asia Deal Feed</h2>
            <span id="deal-count"></span>
          </div>
          <div class="compact-list" id="deal-feed"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Reservations</h2>
            <span>Gmail parsed</span>
          </div>
          <div class="compact-list" id="reservations"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Plaid Sync</h2>
            <span id="finance-sync"></span>
          </div>
          <div class="compact-list" id="finance"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Gmail Intake</h2>
            <span id="intake-count"></span>
          </div>
          <div class="compact-list" id="intake"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Hermes Control</h2>
            <span id="hermes-status"></span>
          </div>
          <div class="compact-list" id="hermes"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Adapter Framework</h2>
            <span id="integration-count"></span>
          </div>
          <div class="compact-list" id="integrations"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
